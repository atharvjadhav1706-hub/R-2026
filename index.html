<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Apex Forge | Task Master</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root { 
    --bg: #050507; 
    --surface: rgba(20, 20, 28, 0.6); 
    --surface2: rgba(255, 255, 255, 0.06); 
    --border: rgba(255, 255, 255, 0.08); 
    --border2: rgba(255, 255, 255, 0.15); 
    --tx: #f4f4f8; 
    --tx2: #9E9A93; 
    --tx3: #6A6763; 
    --mu: #8a8a9d;
    --acc: #E8622A; 
    --acc2: #2A8FE8; 
    --green: #00d26a; 
    --green-bg: rgba(0, 210, 106, 0.15); 
    --gold: #facc15; 
    --neon-green: #39FF14; 
    --cyan: #00d0f4;
    --tb: rgba(255, 255, 255, 0.08);
    --panel: #111116;
    --shadow-sm: 0 8px 24px 0 rgba(0, 0, 0, 0.4); 
    --glass-blur: blur(30px); 
    --r-sm: 12px; 
    --r-md: 16px; 
    --r-lg: 24px; 
    --safe: env(safe-area-inset-bottom, 0px); 
    --font-head: 'Syne', 'Poppins', sans-serif; 
    --font-body: 'Inter', sans-serif; 
    --font-mono: 'JetBrains Mono', 'Space Mono', monospace; 
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{ width:100vw; height:100dvh; overflow:hidden !important; position:fixed; inset:0; font-family:var(--font-body); background:var(--bg); color:var(--tx); overscroll-behavior:none; touch-action:none; }
::-webkit-scrollbar{display:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input, select { font-family:var(--font-body); }

/* ── AMBIENT BACKGROUND BLOBS ── */
.bg-blobs { position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
.blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.6; animation:floatBlob 12s infinite alternate ease-in-out; }
.blob1 { width:40vw; height:40vw; background:rgba(42,143,232,0.15); top:-10%; left:-10%; }
.blob2 { width:50vw; height:50vw; background:rgba(232,98,42,0.1); bottom:-10%; right:-10%; animation-delay:-4s; animation-duration:15s; }
.blob3 { width:35vw; height:35vw; background:rgba(28,153,85,0.1); top:30%; left:60%; animation-delay:-7s; animation-duration:18s; }
@keyframes floatBlob { 0% { transform:translate(0,0) scale(1) rotate(0deg); } 100% { transform:translate(40px,60px) scale(1.15) rotate(15deg); } }

.glass-panel { background:var(--surface); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur); border:1px solid var(--border); box-shadow:var(--shadow-sm); }
.app{width:100%;max-width:1000px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;position:relative;}

/* ── SCROLLING CONTAINER ── */
.vc{ flex:1; overflow-y:auto; overflow-x:hidden; padding:0 16px calc(120px + var(--safe)); position:relative; z-index:10; scroll-behavior:smooth; overscroll-behavior-y:contain; -webkit-overflow-scrolling:touch; touch-action:pan-y; }
.view{display:none;} .view.active{display:block;animation:fadeUp .4s cubic-bezier(.16,1,.3,1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* ── TOP NAV ── */
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:calc(12px + env(safe-area-inset-top,0px)) 0 16px; max-width:480px; margin:0 auto; position:relative;}
.app-title-mini { font-family:var(--font-head); font-weight:800; font-size:16px; letter-spacing:1px; text-transform:uppercase; color:var(--tx2); flex:1; text-align:left; }

/* ── HERO DASHBOARD (TOP BOX) ── */
.hero-dashboard { 
    display:flex; flex-direction: row; align-items:center; justify-content:space-between; 
    padding: 12px 12px 12px 24px; border-radius: 30px 130px 130px 30px; margin-bottom:24px; gap: 16px; 
    background: linear-gradient(145deg, rgba(20,20,28,0.7), rgba(5,5,8,0.9));
    box-shadow: inset 0 4px 25px rgba(0,0,0,0.8), var(--shadow-sm); border: 1px solid var(--border);
    backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    max-width: 480px; margin-left: auto; margin-right: auto;
}
.hero-day-wrap { position: relative; display: flex; align-items: center; justify-content: center; height: 220px; width: 60px; flex-shrink: 0; }

/* ── INTRICATE GEOMETRIC SVG BACKGROUND ── */
.hud-bg { position: absolute; inset: -15px -10px; pointer-events: none; z-index: 1; }
.hud-bg svg { width: 100%; height: 100%; display: block; }
.hero-day-name { writing-mode: vertical-rl; transform: rotate(180deg); font-family: var(--font-mono); font-weight: 800; font-size: 26px; color: #e8e8ea; letter-spacing: 6px; text-transform: uppercase; z-index: 2; -webkit-text-stroke: 0.5px rgba(255,255,255,0.15); text-shadow: 2px 4px 10px rgba(0,0,0,0.8); }

/* Uplifted Ring Wrap */
.triple-ring-wrap { position:relative; width:220px; height:220px; flex-shrink:0; filter: drop-shadow(-10px 15px 20px rgba(0,0,0,0.85)) drop-shadow(0px 0px 10px rgba(0, 208, 244, 0.2)); transform: translateZ(0); }
.dash-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
.ring-track { fill: none; stroke: var(--tb); stroke-width: 8; }
.ring-prog { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.16,1,.3,1); }
.center-display { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center;}
.cd-val { font-size: 3rem; font-family: var(--font-mono); font-weight: 800; line-height: 1; letter-spacing: -1.5px; display:flex; align-items:center; background: linear-gradient(90deg, var(--green), var(--cyan)); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 15px rgba(0,210,106,0.3);}
.cd-lbl { font-size: 10px; font-family: var(--font-head); font-weight: 700; color: var(--tx2); text-transform: uppercase; margin-top: 4px; letter-spacing: 1px;}

/* Orbiting Day Nodes */
.day-node { position: absolute; width: 28px; height: 28px; border-radius: 50%; background: var(--panel); border: 2px solid var(--tb); display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translate(-50%, -50%); z-index: 10; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
.day-node .date-val { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 800; color: var(--mu); }
.day-node .day-out { position: absolute; font-family: var(--font-head); font-size: 0.65rem; font-weight: 800; color: var(--mu); }
.day-node.active { background: var(--tx); border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,208,244,0.4); transform: translate(-50%, -50%) scale(1.2); z-index: 11; }
.day-node.active .date-val { color: var(--bg); }
.day-node.active .day-out { color: var(--cyan); }
.day-node.done { background: var(--green); border-color: var(--green); }
.day-node.done .date-val { color: #fff; }

/* Smart Mobile Scaling for Rings */
@media (max-width: 400px) {
    .hero-dashboard { padding: 12px; gap: 8px; justify-content: center; }
    .hero-day-wrap { width: 40px; margin-right: -10px;}
    .triple-ring-wrap { transform: scale(0.8); transform-origin: right center; margin-right: -15px; }
}

.three-boxes { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:24px; max-width:480px; margin-left:auto; margin-right:auto; }
.stat-box { border-radius:var(--r-md); padding:16px 8px; display:flex; flex-direction:column; align-items:center; }
.sb-val { font-family:var(--font-head); font-size:22px; font-weight:800; display:flex; align-items:baseline; gap:3px; }
.sb-unit { font-size:11px; font-weight:700; color:var(--tx3); text-transform:uppercase; }
.sb-lbl { font-size:10px; font-weight:700; color:var(--tx2); text-transform:uppercase; margin-top:6px; text-align:center; line-height:1.2; }

/* ── TASKS CARDS ── */
.wcard{ display:flex;align-items:center;gap:14px; border-radius:var(--r-md); padding:16px; margin-bottom:12px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; animation:fadeUp .4s forwards; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-sm); max-width: 480px; margin-left: auto; margin-right: auto; }
.wcard.done{opacity:.75; border-color:rgba(0,210,106,0.3); transform:scale(0.98); box-shadow:none;}
.wcard.done .wcard-name{color:var(--tx3); text-decoration: line-through;}
.wcard-icon{width:46px;height:46px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:20px; background:var(--surface2); color:var(--cyan);}
.wcard.done .wcard-icon{background:rgba(0,210,106,0.1); color:var(--green);}
.wcard-body{flex:1;min-width:0;z-index:2;}
.wcard-tag{font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:4px;}
.wcard-name{font-family:var(--font-head);font-size:16px;font-weight:700; word-break: break-word;}

/* ── CHECKBOX (AS REQUESTED) ── */
.chkbox { width:30px; height:30px; border-radius:50%; border:2px solid rgba(128,128,153,0.3); display:flex; align-items:center; justify-content:center; transition:all 0.3s; position:relative; z-index:10; background:transparent;}
.chkbox svg { width:15px; height:15px; stroke-width:4; stroke:var(--bg); fill:none; transform:scale(0.5); opacity:0; transition:all 0.3s; }
.wcard.done .chkbox { background:var(--green)!important; border-color:var(--green)!important; box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--green)!important; }
.wcard.done .chkbox svg { transform:scale(1); opacity:1; stroke:#000; }

.sec-head{display:flex;justify-content:space-between;align-items:center;margin:32px auto 12px; border-bottom:1px solid var(--border2); padding-bottom:8px; max-width:480px;}
.sec-title{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--tx2);text-transform:uppercase; letter-spacing:0.5px;}
.empty-state { text-align: center; color: var(--tx3); font-size: 14px; padding: 40px 0; font-family: var(--font-mono); }

/* ── MONTH ACCORDION VIEW ── */
.month-group { max-width: 480px; margin: 0 auto 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; transition: all 0.3s; }
.month-header { padding: 16px; font-family: var(--font-head); font-weight: 700; font-size: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.02); }
.month-header svg { width: 20px; height: 20px; transition: transform 0.3s; }
.month-tasks { padding: 0 16px 16px; display: block; }
.month-group.collapsed { opacity: 0.7; transform: scale(0.98); }
.month-group.collapsed .month-tasks { display: none; }
.month-group.collapsed .month-header svg { transform: rotate(-90deg); }

/* ── BOTTOM NAV ── */
.bnav { position: fixed; bottom: calc(24px + var(--safe)); left: 50%; transform: translateX(-50%); width: max-content; border-radius: 100px; display: flex; padding: 8px; gap: 8px; z-index: 1000; background: rgba(22,22,30,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
.bb { display: flex; align-items: center; justify-content: center; padding: 12px 30px; border-radius: 100px; color: var(--tx3); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: none; background: transparent; cursor: pointer; }
.bb svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.5; fill: none; transition: all 0.4s; }
.bb.active { color: var(--bg); background: var(--tx); box-shadow: 0 4px 15px rgba(255,255,255,0.1); transform: translateY(-2px); }

/* ── FAB BUTTON (ADD TASK) ── */
.fab { position: fixed; bottom: calc(90px + var(--safe)); right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--acc2)); color: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0, 208, 244, 0.4); z-index: 999; cursor: pointer; transition: transform 0.2s; }
.fab:active { transform: scale(0.9); }
.fab svg { width: 28px; height: 28px; stroke: #000; stroke-width: 2.5; fill: none; }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal { width: 100%; max-width: 360px; border-radius: var(--r-lg); padding: 24px; display: flex; flex-direction: column; transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); background: var(--surface); backdrop-filter: var(--glass-blur); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.modal-overlay.active .modal { transform: translateY(0); }

.modal-title { font-family: var(--font-head); font-size: 20px; font-weight: 800; margin-bottom: 20px; color: var(--tx); text-transform: uppercase; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--tx2); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
.mod-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border2); color: var(--tx); padding: 14px; border-radius: var(--r-sm); font-size: 16px; outline: none; } /* 16px disables iOS zoom */
.mod-input:focus { border-color: var(--cyan); }

.radio-group { display: flex; gap: 12px; margin-bottom: 16px; }
.radio-btn { flex: 1; text-align: center; padding: 12px; border: 1px solid var(--border2); border-radius: var(--r-sm); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.radio-btn.active { background: var(--tx); color: var(--bg); border-color: var(--tx); }
.btn-primary { background: var(--cyan); color: #000; padding: 16px; border-radius: var(--r-sm); font-family: var(--font-head); font-weight: 800; font-size: 15px; text-transform: uppercase; margin-top: 8px; }

/* ── FUTURISTIC CRUSHED POPUP OVERLAY (AS REQUESTED) ── */
.crush-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
.crush-overlay.show { opacity: 1; pointer-events: auto; }
.crush-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.crush-line { fill: none; stroke: var(--cyan); stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 8px var(--cyan)); stroke-dasharray: 2000; stroke-dashoffset: 2000; }
.crush-overlay.show .crush-line { animation: drawCrushLine 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
@keyframes drawCrushLine { 0% { stroke-dashoffset: 2000; opacity: 1; } 80% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 0.15; } }
.crush-text-wrap { position: relative; z-index: 2; text-align: center; }
.crush-text { font-family: var(--font-mono); font-size: 3.5rem; font-weight: 800; color: transparent; -webkit-text-stroke: 2px rgba(255,255,255,0.8); letter-spacing: 4px; line-height: 1.1; text-transform: uppercase; opacity: 0; transform: translateY(20px) scale(0.9); }
.crush-overlay.show .crush-text { animation: crushTextIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.6s; }
.crush-text::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%; color: var(--neon-green); text-shadow: 0 0 25px var(--green); -webkit-text-stroke: 0; clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
.crush-overlay.show .crush-text::after { animation: crushFill 1s cubic-bezier(0.8, 0, 0.2, 1) forwards; animation-delay: 1.2s; }
@keyframes crushTextIn { 0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); } 20% { opacity: 1; transform: translateY(0) scale(1.05); filter: blur(0); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes crushFill { 0% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); } 100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); } }

/* Fix Date Picker Icon Color */
::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
</style>
</head>
<body>

<div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>

<div class="app">
  <div class="vc" id="mainScroll">
    <div class="top-bar">
      <div class="app-title-mini">APEX FORGE | TASK MASTER</div>
    </div>

    <div class="view active" id="tabToday">
      <div class="hero-dashboard">
        <div class="hero-day-wrap">
          <div class="hud-bg">
            <svg viewBox="0 0 100 300" preserveAspectRatio="none">
              <polyline points="0,20 20,20 20,60 40,80 40,120 20,140 20,180 40,200 40,240 20,260 20,300" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linejoin="miter"/>
              <polyline points="100,40 80,40 80,80 60,100 60,140 80,160 80,200 60,220 60,260 80,280 80,300" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linejoin="miter"/>
              <line x1="0" y1="140" x2="10" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <line x1="90" y1="180" x2="100" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <line x1="60" y1="220" x2="40" y2="220" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
              <rect x="72" y="120" width="8" height="8" fill="rgba(255, 255, 255, 0.4)"/>
              <rect x="72" y="140" width="8" height="8" fill="rgba(255, 255, 255, 0.4)"/>
              <path d="M 10,280 L 30,280 L 40,290" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <path d="M 90,20 L 70,20 L 60,10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
              <circle cx="20" cy="10" r="2" fill="var(--tx2)"/>
              <circle cx="80" cy="290" r="2" fill="var(--tx2)"/>
            </svg>
          </div>
          <div class="hero-day-name" id="heroDayName">TODAY</div>
        </div>
        
        <div class="triple-ring-wrap">
          <svg viewBox="0 0 220 220" class="dash-svg">
            <defs>
              <linearGradient id="wkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00d0f4"><animate attributeName="stop-color" values="#00d0f4;#b058e8;#ff2a5f;#00d0f4" dur="4s" repeatCount="indefinite" /></stop>
                <stop offset="100%" stop-color="#ff2a5f"><animate attributeName="stop-color" values="#ff2a5f;#ff8800;#00d26a;#ff2a5f" dur="4s" repeatCount="indefinite" /></stop>
              </linearGradient>
              <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
              <linearGradient id="todayGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#00d26a" />
                <stop offset="100%" stop-color="#00d0f4" />
              </linearGradient>
            </defs>
            <circle cx="110" cy="110" r="84" class="ring-track"/>
            <circle cx="110" cy="110" r="60" class="ring-track"/>
            <circle cx="110" cy="110" r="84" class="ring-prog" id="ringWeek" stroke="url(#wkGrad)" filter="url(#neonGlow)"/>
            <circle cx="110" cy="110" r="60" class="ring-prog" id="ringProgress" stroke="url(#todayGrad)"/>
          </svg>
          
          <div id="weekNodesEl"></div>
          
          <div class="center-display">
             <div class="cd-val" id="centerPct">0%</div>
             <div class="cd-lbl">Completed</div>
          </div>
        </div>
      </div>

      <div class="three-boxes">
        <div class="stat-box glass-panel"><div class="sb-val" id="statTotal">0</div><div class="sb-lbl">Total Today</div></div>
        <div class="stat-box glass-panel"><div class="sb-val" id="statDone">0</div><div class="sb-lbl">Tasks Done</div></div>
        <div class="stat-box glass-panel"><div class="sb-val" id="statPending">0</div><div class="sb-lbl">Pending</div></div>
      </div>

      <div class="sec-head"><span class="sec-title">Today's Protocol</span></div>
      <div id="todayTasksList"></div>
    </div>

    <div class="view" id="tabMonth">
       <div class="sec-head"><span class="sec-title">Monthly Vault</span></div>
       <div id="monthAccordionList"></div>
    </div>
  </div>

  <button class="fab" onclick="openTaskModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <nav class="bnav" id="appBottomNav">
    <button class="bb active" id="navT0" onclick="switchTab(0)"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></button>
    <button class="bb" id="navT1" onclick="switchTab(1)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></button>
  </nav>

  <div id="taskModal" class="modal-overlay" onclick="if(event.target===this)closeTaskModal()">
    <div class="modal">
      <div class="modal-title">Forge New Task</div>
      
      <div class="input-group">
        <label>Task Name</label>
        <input type="text" id="inpTaskName" class="mod-input" placeholder="e.g. Morning Run, Submit Report..." autocomplete="off">
      </div>

      <div class="input-group">
        <label>Frequency</label>
        <div class="radio-group">
          <div class="radio-btn active" id="btnTypeDaily" onclick="setTaskType('daily')">Daily Routine</div>
          <div class="radio-btn" id="btnTypeDate" onclick="setTaskType('date')">Specific Date</div>
        </div>
      </div>

      <div class="input-group" id="datePickerGroup" style="display:none;">
        <label>Select Date</label>
        <input type="date" id="inpTaskDate" class="mod-input">
      </div>

      <button class="btn-primary" onclick="saveNewTask()">Create Task</button>
    </div>
  </div>
  
  <div id="crushedPopup" class="crush-overlay" onclick="this.classList.remove('show')">
    <svg class="crush-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <polyline class="crush-line" points="10,10 30,10 40,20 60,20 70,10 90,10" stroke-width="0.5"/>
      <polyline class="crush-line" points="10,90 30,90 40,80 60,80 70,90 90,90" stroke-width="0.5"/>
      <polyline class="crush-line" points="5,20 15,30 15,40 5,50 15,60 15,70 5,80" stroke-width="1"/>
      <polyline class="crush-line" points="95,20 85,30 85,40 95,50 85,60 85,70 95,80" stroke-width="1"/>
      <line class="crush-line" x1="0" y1="50" x2="100" y2="50" stroke-width="0.2" stroke-dasharray="2,2"/>
      <circle cx="50" cy="50" r="25" class="crush-line" stroke-width="0.5" stroke-dasharray="4,4" fill="none"/>
    </svg>
    <div class="crush-text-wrap">
      <div class="crush-text" data-text="DAY CRUSHED">DAY<br>CRUSHED</div>
    </div>
  </div>

</div>

<script>
'use strict';

const STORAGE_KEY = 'apex_tasks_v2';
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEK_DAYS = ['M','T','W','T','F','S','S'];

let DB = {
    tasks: [],      // { id, title, type: 'daily' | 'date', date: 'YYYY-MM-DD' }
    completions: {} // keys: "taskId_YYYY-MM-DD", val: true
};

let currentTaskType = 'daily';

// Helpers to get strict local YYYY-MM-DD
function getLocalDateString(d = new Date()) {
    const tzOffset = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - tzOffset).toISOString().split('T')[0];
}

function loadDB() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) DB = { ...DB, ...JSON.parse(saved) };
    } catch(e) {}
}

function saveDB() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); } catch(e) {}
}

// ── UI TOGGLES ──
function switchTab(index) {
    document.getElementById('mainScroll').scrollTop = 0;
    ['tabToday', 'tabMonth'].forEach(id => document.getElementById(id).classList.remove('active'));
    ['navT0', 'navT1'].forEach(id => document.getElementById(id).classList.remove('active'));
    
    if (index === 0) {
        document.getElementById('tabToday').classList.add('active');
        document.getElementById('navT0').classList.add('active');
        renderToday();
    } else {
        document.getElementById('tabMonth').classList.add('active');
        document.getElementById('navT1').classList.add('active');
        renderMonthView();
    }
}

// ── MODAL LOGIC ──
function openTaskModal() {
    document.getElementById('inpTaskName').value = '';
    document.getElementById('inpTaskDate').value = getLocalDateString();
    setTaskType('daily');
    document.getElementById('taskModal').classList.add('active');
}
function closeTaskModal() {
    document.getElementById('taskModal').classList.remove('active');
}
function setTaskType(type) {
    currentTaskType = type;
    document.getElementById('btnTypeDaily').classList.toggle('active', type === 'daily');
    document.getElementById('btnTypeDate').classList.toggle('active', type === 'date');
    document.getElementById('datePickerGroup').style.display = type === 'date' ? 'block' : 'none';
}

function saveNewTask() {
    const title = document.getElementById('inpTaskName').value.trim();
    if (!title) return alert("Task name cannot be empty.");
    
    const date = document.getElementById('inpTaskDate').value; 

    const newTask = {
        id: Date.now().toString(),
        title: title,
        type: currentTaskType,
        date: currentTaskType === 'date' ? date : null
    };

    DB.tasks.push(newTask);
    saveDB();
    closeTaskModal();
    
    if (document.getElementById('tabToday').classList.contains('active')) renderToday();
    else renderMonthView();
}

// ── TASK LOGIC ──
function toggleTaskDone(taskId, dateStr) {
    const compKey = `${taskId}_${dateStr}`;
    const wasDone = !!DB.completions[compKey];
    
    if (wasDone) {
        delete DB.completions[compKey];
    } else {
        DB.completions[compKey] = true;
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    }
    saveDB();
    
    if (document.getElementById('tabToday').classList.contains('active')) renderToday(true);
    else renderMonthView();
}

function buildTaskCard(task, targetDateStr) {
    const compKey = `${task.id}_${targetDateStr}`;
    const isDone = !!DB.completions[compKey];
    const icon = task.type === 'daily' ? '🔄' : '📅';
    const tag = task.type === 'daily' ? 'DAILY ROUTINE' : 'EVENT DATE';
    
    return `
    <div class="wcard glass-panel ${isDone ? 'done' : ''}" onclick="toggleTaskDone('${task.id}', '${targetDateStr}')">
        <div class="wcard-icon">${icon}</div>
        <div class="wcard-body">
            <div class="wcard-tag">${tag}</div>
            <div class="wcard-name">${task.title}</div>
        </div>
        <div class="chkbox">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
    </div>`;
}

// ── UI DRAWING ──
function drawWeek() {
    const el = document.getElementById('weekNodesEl');
    if(!el) return;
    el.innerHTML = '';

    const now = new Date(); 
    now.setHours(0,0,0,0);
    
    const dayOfWeek = now.getDay();
    const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() + diffToMonday);
    
    const daysInRing = 7;
    const currentDayIndex = Math.round((now - startOfWeek) / 86400000);

    for (let i = 0; i < daysInRing; i++) {
        const iterDate = new Date(startOfWeek); 
        iterDate.setDate(startOfWeek.getDate() + i);
        
        const isToday = iterDate.getTime() === now.getTime();
        const dateStr = getLocalDateString(iterDate);
        
        const dayTasks = DB.tasks.filter(t => t.type === 'daily' || t.date === dateStr);
        let isDone = false;
        
        if (dayTasks.length > 0) {
            isDone = dayTasks.every(t => !!DB.completions[`${t.id}_${dateStr}`]);
        }

        const angle = (i * (360/daysInRing)) - 90;
        const rad = angle * Math.PI / 180;
        const R = 84; // Matches the outer ring radius
        
        const x = 110 + R * Math.cos(rad);
        const y = 110 + R * Math.sin(rad);

        const dx = Math.cos(rad) * 26;
        const dy = Math.sin(rad) * 26;

        const node = document.createElement('div');
        node.className = 'day-node' + (isToday ? ' active' : '') + (isDone ? ' done' : '');
        node.style.left = x + 'px';
        node.style.top = y + 'px';

        node.innerHTML = `<span class="date-val">${iterDate.getDate()}</span><span class="day-out" style="transform: translate(${dx}px, ${dy}px);">${WEEK_DAYS[i]}</span>`;
        el.appendChild(node);
    }

    const wCirc = 2 * Math.PI * 84;
    let fillLength = (currentDayIndex / daysInRing) * wCirc;
    if (fillLength > wCirc) fillLength = wCirc; 
    if (currentDayIndex <= 0) fillLength = 0.01; 

    const ringWeek = document.getElementById('ringWeek');
    if (ringWeek) {
        ringWeek.style.strokeDasharray = wCirc;
        ringWeek.style.strokeDashoffset = wCirc - fillLength;
    }
}

function updateHeroStats(done, total) {
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('centerPct').textContent = `${pct}%`;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statPending').textContent = total - done;

    // Inner ring (r=60)
    const circ = 2 * Math.PI * 60; 
    const ring = document.getElementById('ringProgress');
    ring.style.strokeDasharray = circ;
    ring.style.strokeDashoffset = circ * (1 - (pct / 100));
}

function renderToday(isFromToggle = false) {
    const todayStr = getLocalDateString();
    const todayTasks = DB.tasks.filter(t => t.type === 'daily' || t.date === todayStr);
    const listEl = document.getElementById('todayTasksList');
    
    if (todayTasks.length === 0) {
        listEl.innerHTML = '<div class="empty-state">No tasks for today. Hit the forge button below.</div>';
        updateHeroStats(0, 0);
        drawWeek();
        return;
    }

    let doneCount = 0;
    const cardsHtml = todayTasks.map(t => {
        if (DB.completions[`${t.id}_${todayStr}`]) doneCount++;
        return buildTaskCard(t, todayStr);
    }).join('');
    
    listEl.innerHTML = cardsHtml;
    updateHeroStats(doneCount, todayTasks.length);
    drawWeek(); // Refresh week nodes colors

    // Trigger Crushed Popup if all done
    if (isFromToggle && doneCount === todayTasks.length && todayTasks.length > 0) {
        const cp = document.getElementById('crushedPopup');
        if(cp) {
            cp.classList.remove('show');
            void cp.offsetWidth; // trigger reflow
            cp.classList.add('show');
            setTimeout(() => cp.classList.remove('show'), 3500);
        }
    }
}

// ── TAB 2: MONTH LOGIC (ACCORDION) ──
function toggleMonthAccordion(monthKey) {
    const el = document.getElementById(`month-grp-${monthKey}`);
    if (el) el.classList.toggle('collapsed');
}

function renderMonthView() {
    const today = new Date();
    const currentMonthKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
    let grouped = {};

    DB.tasks.forEach(task => {
        if (task.type === 'date') {
            const mKey = task.date.substring(0, 7); // YYYY-MM
            if (!grouped[mKey]) grouped[mKey] = [];
            grouped[mKey].push({ ...task, instanceDate: task.date });
        } else if (task.type === 'daily') {
            if (!grouped[currentMonthKey]) grouped[currentMonthKey] = [];
            grouped[currentMonthKey].push({ ...task, instanceDate: getLocalDateString() });
        }
    });

    const listEl = document.getElementById('monthAccordionList');
    
    if (Object.keys(grouped).length === 0) {
        listEl.innerHTML = '<div class="empty-state">No events scheduled.</div>';
        return;
    }

    const sortedMonths = Object.keys(grouped).sort();
    let html = '';
    
    sortedMonths.forEach(mKey => {
        const [yyyy, mm] = mKey.split('-');
        const monthName = `${MONTH_NAMES[parseInt(mm) - 1]} ${yyyy}`;
        
        let allDone = true;
        let tasksHtml = grouped[mKey].map(t => {
            const isDone = !!DB.completions[`${t.id}_${t.instanceDate}`];
            if (!isDone) allDone = false;
            return buildTaskCard(t, t.instanceDate);
        }).join('');

        const isPast = mKey < currentMonthKey;
        const isCollapsed = isPast || allDone;

        html += `
        <div class="month-group ${isCollapsed && mKey !== currentMonthKey ? 'collapsed' : ''}" id="month-grp-${mKey}">
            <div class="month-header" onclick="toggleMonthAccordion('${mKey}')">
                <span>${monthName} ${allDone ? ' <span style="color:var(--green);font-size:12px;margin-left:8px;">✓ COMPLETED</span>' : ''}</span>
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="month-tasks">
                <div style="padding-top:16px;">
                    ${tasksHtml}
                </div>
            </div>
        </div>`;
    });

    listEl.innerHTML = html;
    drawWeek(); // Ensure global state stays updated across UI
}

// ── INIT ──
loadDB();
switchTab(0);
const todayD = new Date();
const daysFull = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
document.getElementById('heroDayName').textContent = daysFull[todayD.getDay()];

</script>
</body>
</html>
